# MG-CMT Training Configuration

# Experiment
exp_name: mg_cmt_baseline
data_root: data/JU-LDD-task-b

save_dir: checkpoints

# Model Architecture
img_size: 224
patch_size: 16
num_layers: 4        # Transformer layers
embed_dim: 192       # Reduced capacity
num_heads: 8         # Attention heads
fmca_modulation: logit  # 'logit' or 'post'
dropout: 0.3           # 30% dropout (regularization)

# Training
batch_size: 4        # Adjust based on M4 Air memory
num_epochs: 30
learning_rate: 0.0003
weight_decay: 0.15   # Aggressive regularization

# Data Loading
num_workers: 0       # Parallel data loading workers
